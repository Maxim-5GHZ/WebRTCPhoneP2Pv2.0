# TURN server configuration for local development

# The port for TURN clients to connect to.
listening-port=3478

# The range of ports for media relaying.
# This range MUST be exposed in your docker-compose file.
min-port=49152
max-port=49351

# Use a static secret for time-limited credentials, as expected by the backend.
# The value of this secret MUST match the 'webrtc.turn.secret' and 'TURN_PASSWORD'
# properties in application.properties and your .env file.
use-auth-secret
static-auth-secret=${TURN_PASSWORD}

# --- IMPORTANT ---
# For testing from other devices on your local network, you MUST
# uncomment and set the following two lines.

# Set 'realm' to the local IP address of the machine running Docker.
# This IP is used by clients to identify the TURN server.
realm=192.168.1.50

# Set 'external-ip' to the same local IP address.
# This tells clients which IP address to connect back to for media.
external-ip=192.168.1.50

# For production, 'realm' should be your domain name (e.g., mydomain.com)
# and 'external-ip' should be the public IP of your server.
# realm=mydomain.com
# external-ip=YOUR_SERVER_PUBLIC_IP

# Enable fingerprinting for STUN messages.
fingerprint

# Enable long-term credential mechanism (required for use-auth-secret).
lt-cred-mech

# Log file location (optional, logs to stdout by default in the container).
# log-file=/var/turnserver.log
no-multicast-peers
no-cli
no-tls
no-dtls
