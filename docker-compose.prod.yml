version: '3.8'

services:
  nginx:
    image: your-registry/webrtc-nginx:latest # <-- Замените на ваш образ Nginx
    container_name: nginx_server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Пути к сертификатам на вашем сервере
      - /etc/letsencrypt/live/webrtc.yourdomain.com/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/webrtc.yourdomain.com/privkey.pem:/etc/ssl/private/privkey.pem:ro
    networks:
      - app-network
    depends_on:
      - frontend
      - backend

  backend:
    image: your-registry/webrtc-backend:latest # <-- Замените на ваш образ бэкенда
    container_name: backend_server
    restart: unless-stopped
    environment:
      - MARIADB_HOST=mariadb
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - KURENTO_URL=ws://kurento:8888/kurento
    depends_on:
      mariadb:
        condition: service_healthy
      coturn:
        condition: service_started
      kurento:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: frontend_prod_server
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started

  kurento:
    image: kurento/kurento-media-server:latest
    container_name: kurento_media_server
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - app-network

  mariadb:
    image: mariadb:10.9
    container_name: mariadb_server
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "${MARIADB_USER}",
          "-p${MARIADB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn
    container_name: coturn_server
    restart: unless-stopped
    env_file:
      - .env
    command: turnserver -c /etc/coturn/turnserver.conf -v
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49351:49152-49351/udp" # Add this range for media relay
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./nginx-docker/ssl:/etc/nginx/ssl
    networks:
      - app-network

volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge
