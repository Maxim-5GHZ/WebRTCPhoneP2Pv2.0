services:
  nginx:
    build:
      context: .
      dockerfile: nginx-docker/Dockerfile.dev
    container_name: nginx_dev_server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-docker/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_dev_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MARIADB_HOST=mariadb
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - mariadb
      - coturn
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: frontend_dev_server
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
