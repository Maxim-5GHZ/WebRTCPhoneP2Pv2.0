services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nginx_prod_server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-docker/conf.d:/etc/nginx/conf.d:ro
      - ./nginx-docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: backend_prod_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MARIADB_HOST=mariadb
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      - mariadb
      - coturn
    networks:
      - app-network

  mariadb:
    image: mariadb:10.9
    container_name: mariadb_server
    restart: unless-stopped
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app-network

  coturn:
    image: coturn/coturn
    container_name: coturn_server
    restart: unless-stopped
    env_file:
      - .env
    command: turnserver -c /etc/coturn/turnserver.conf --static-auth-secret=${TURN_PASSWORD} -v -L /tmp/turnserver.log
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49351:49152-49351/udp" # Add this range for media relay
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - app-network

volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge
